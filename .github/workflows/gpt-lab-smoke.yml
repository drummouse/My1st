name: GPT Lab CI

on:
  push:
    branches:
      - chatgpt/configurator-gpt-lab
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gpt-lab-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build configurator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: configurator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: configurator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  live-smoke:
    name: Live Vercel and Neon smoke test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: configurator
    env:
      SMOKE_BASE_URL: https://ironwrap-configurator-gpt-lab-drummouses-projects.vercel.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: configurator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for Vercel deployment
        run: |
          for attempt in {1..24}; do
            if curl --fail --silent --show-error "$SMOKE_BASE_URL/api/health" >/dev/null; then
              exit 0
            fi
            echo "Waiting for Vercel deployment (attempt $attempt/24)..."
            sleep 10
          done
          echo "Vercel deployment did not become healthy in time."
          exit 1

      - name: Run smoke tests
        run: npm run smoke
